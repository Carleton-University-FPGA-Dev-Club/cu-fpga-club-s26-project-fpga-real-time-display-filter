<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPGA Filter Controller</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div id="app" class="max-w-4xl mx-auto p-6">
        <header class="border-b border-slate-700 pb-4 mb-8">
            <h1 class="text-2xl font-bold text-indigo-400">FPGA Filter Controller</h1>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <section class="bg-slate-800 p-5 rounded-xl border border-slate-700">
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Filter Type</label>
                <select v-model="selectedFilter" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 mb-4">
                    <option v-for="(filter, key) in filters" :key="key" :value="key">{{ filter.name }}</option>
                </select>

                <div v-for="param in filters[selectedFilter].params" :key="param.name" class="mb-4">
                    <label class="text-xs text-slate-300">{{ param.label }}: {{ param.value }}</label>
                    <input type="range" :min="param.min" :max="param.max" :step="param.step" v-model.number="param.value" @change="updateHardware" class="w-full h-1.5 bg-slate-700 rounded-lg cursor-pointer">
                </div>
            </section>

            <section class="bg-slate-800 p-5 rounded-xl border border-slate-700">
                <h2 class="text-sm font-semibold text-slate-400 mb-4">Transmission Log</h2>
                <pre class="text-indigo-300 bg-slate-900 p-3 rounded font-mono text-xs">{{ currentPayload }}</pre>
                <button @click="updateHardware" class="mt-4 w-full bg-indigo-600 hover:bg-indigo-500 py-2 rounded-lg font-bold transition">Sync to FPGA</button>
            </section>
        </main>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                const selectedFilter = ref('kernel');
                const esp32Ip = "192.168.1.50"; // CHANGE THIS to your ESP32's actual IP

                const filters = ref({
                    kernel: { 
                        name: 'Edge Detection (Sobel)', 
                        regId: 0x05, 
                        params: [{ name: 'limit', label: 'Threshold', min: 0, max: 255, step: 1, value: 128 }] 
                    }
                });

                const currentPayload = computed(() => {
                    const current = filters.value[selectedFilter.value];
                    return JSON.stringify({
                        filter_id: current.regId,
                        params: current.params.reduce((acc, p) => ({ ...acc, [p.name]: p.value }), {})
                    }, null, 2);
                });

                const updateHardware = async () => {
                    try {
                        const response = await fetch(`http://${esp32Ip}/api/config`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: currentPayload.value
                        });
                        if (response.ok) alert("FPGA Updated Successfully");
                    } catch (err) {
                        console.error("Transmission failed:", err);
                    }
                };

                return { selectedFilter, filters, currentPayload, updateHardware };
            }
        }).mount('#app');
    </script>
</body>
</html>
